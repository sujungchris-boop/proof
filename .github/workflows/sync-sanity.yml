name: Sync case studies from Sanity

# Auto-reflects C&P Sanity changes (new Web3 plates, photo/scope/order edits)
# onto the PROOF site. Regenerates from Sanity on a schedule and pushes ONLY
# when the output actually changed → Vercel then deploys the update.
# Run it on demand from the Actions tab (workflow_dispatch) for an instant sync.

on:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-sanity
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate work pages from Sanity
        run: node scripts/build-cases.js

      - name: Commit & push if Sanity changed
        run: |
          git config user.name "proof-sync-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add work sitemap.xml hero-images.js
          if git diff --cached --quiet; then
            echo "No changes — Sanity content unchanged."
          else
            git commit -m "auto: sync case studies from Sanity [skip ci]"
            git push
            echo "Pushed Sanity updates → Vercel will deploy."
          fi
